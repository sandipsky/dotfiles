# -----------------------------------------------------
# Variables
# -----------------------------------------------------

$mainMod     = SUPER

# Default applications
$terminal    = alacritty
$browser     = google-chrome-stable
$filemanager = nautilus
$calculator  = gnome-calculator
$noctalia    = qs -c noctalia-shell ipc call


# -----------------------------------------------------
# Key bindings
# -----------------------------------------------------

# Applications
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, W, exec, $browser
bind = $mainMod, G, exec, lutris
bind = $mainMod, E, exec, $filemanager --new-window
bind = $mainMod SHIFT, E, exec, $filemanager admin://
bind = $mainMod, C, exec, $calculator
bind = $mainMod, P, exec, $noctalia wallpaper random
bind = $mainMod SHIFT, C, exec, hyprpicker -a

# Windows
bind = $mainMod, Q, killactive
bind = ALT, F4, killactive
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, M, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, Z, togglefloating
bind = ALT, tab, cyclenext
bind = $mainMod, tab, cyclenext

bind = $mainMod, left, movewindow, l
bind = $mainMod, right, movewindow, r
bind = $mainMod, up, movewindow, u
bind = $mainMod, down, movewindow, d

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, up, resizeactive, 100 0
bind = $mainMod SHIFT, down, resizeactive, -100 0

# -----------------------------------------------------
# Workspaces
# -----------------------------------------------------

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

bind = $mainMod CTRL, left, workspace, r-1
bind = $mainMod CTRL, right, workspace, r+1

bind = $mainMod CTRL, h, workspace, r-1
bind = $mainMod CTRL, l, workspace, r+1

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

bind = $mainMod SHIFT, left, movetoworkspace, r-1
bind = $mainMod SHIFT, right, movetoworkspace, r+1

bind = $mainMod SHIFT, h, movetoworkspace, r-1
bind = $mainMod SHIFT, l, movetoworkspace, r+1

bind = $mainMod, mouse_down, workspace, r-1
bind = $mainMod, mouse_up, workspace, r+1
bind = $mainMod SHIFT, mouse_down, movetoworkspace, r-1
bind = $mainMod SHIFT, mouse_up, movetoworkspace, r+1

# -----------------------------------------------------
# Actions
# -----------------------------------------------------

bind = ALT, space, exec, $noctalia launcher toggle
bind = $mainMod, SUPER_L, exec, $noctalia launcher toggle
bind = $mainMod, V, exec, $noctalia launcher clipboard
bind = $mainMod, A, exec, $noctalia controlCenter toggle
bind = $mainMod, X, exec, $noctalia sessionMenu toggle
bind = $mainMod, L, exec, $noctalia lockScreen lock

bind = $mainMod SHIFT, RETURN, exec, virsh --connect qemu:///system start win; virt-viewer --connect qemu:///system win
bind = $mainMod SHIFT, N, exec, hyprctl reload
bind = $mainMod SHIFT, W, exec, $noctalia wallpaper toggle

bindl = , switch:Lid Switch, exec, $noctalia sessionMenu lockAndSuspend

bind = $mainMod, I, exec, $noctalia brightness decrease
bind = $mainMod, O, exec, $noctalia brightness increase

bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim && notify-send -u normal -a "Snipping Tool" "Screenshot Captured" "Screenshot saved to /home/Pictures folder."

# -----------------------------------------------------
# Fn / Media keys
# -----------------------------------------------------

bind = , XF86MonBrightnessUp, exec, $noctalia brightness increase
bind = , XF86MonBrightnessDown, exec, $noctalia brightness decrease
bind = , XF86AudioRaiseVolume, exec, $noctalia volume increase
bind = , XF86AudioLowerVolume, exec, $noctalia volume decrease
bind = , XF86AudioMute, exec, $noctalia volume muteOutput
bind = , XF86AudioMicMute, exec, $noctalia volume muteInput
bind = , XF86Lock, exec, $noctalia lockScreen lock
bind = , Print, exec, grim - | wl-copy

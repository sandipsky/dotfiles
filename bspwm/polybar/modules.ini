######################################################

[module/xwindow]
type = internal/xwindow
label = %class%

[module/date]
type = internal/date

interval = 1.0

time = %I:%M %p
format-background = ${color.mb}
format-foreground = ${color.fg}
date-alt = " %A, %d %B %Y"

format = <label>
format-prefix = "ï€—"
format-prefix-background = ${color.mb}
format-prefix-foreground = ${color.blue-gray}

label = %date% %time%

######################################################

[module/network]
type = internal/network
interface = wlo1

interval = 2.0
accumulate-stats = true
unknown-as-up = true

format-connected = <ramp-signal> <label-connected>
format-connected-background = ${color.mb}
format-connected-foreground = ${color.cyan}

ramp-signal-0 = َ°¤¯ 
ramp-signal-1 = َ°¤ں 
ramp-signal-2 = َ°¤¥ 
ramp-signal-3 = َ°¤¨ 
ramp-signal-4 = َ°¤¨ 
ramp-signal-5 = َ°¤¨ 

speed-unit = ""
label-connected = %{A1:$HOME/.local/bin/rofi-wifi-menu.sh &:} %essid%%{A}
label-connected-background = ${color.mb}
label-connected-foreground = #FFF

format-disconnected = <label-disconnected>
format-disconnected-prefix = î¬پ 
format-disconnected-foreground = ${color.red}

label-disconnected = %{A1:$HOME/.local/bin/rofi-wifi-menu.sh &:} No Internet%{A}
label-disconnected-foreground = #FFF

######################################################

[module/pulseaudio]
type = internal/pulseaudio

sink = alsa_output.pci-0000_00_1b.0.analog-stereo
use-ui-max = true
interval = 5

format-volume = <ramp-volume><label-volume>
format-volume-prefix = ""
format-volume-background = ${color.mb}
format-volume-foreground = #FFFFFF

label-volume = "  %percentage% "
label-volume-background = ${color.mb}
label-volume-foreground = ${color.fg}

format-muted = <label-muted>
format-muted-prefix = ïڑ©
format-muted-background = ${color.mb}
label-muted = " Muted"
label-muted-foreground = ${color.red}
label-muted-background = ${color.mb}

ramp-volume-0 = ï€¦ 
ramp-volume-1 = ï€§ 
ramp-volume-2 = ï€§ 
ramp-volume-3 = ï€¨ 
ramp-volume-4 = ï€¨
ramp-volume-font = 4 

click-right = pavucontrol

######################################################

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = #f5f5f5
label-active-foreground = ${color.bg}
label-active-padding = 2

label-occupied = %name%
label-occupied-padding = 2

label-empty = %name%

window:
  padding:
    x: 10
    y: 10
  class:
    instance: Alacritty
    general: Alacritty
  opacity: 1

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: DejaVuSansMono  
    style:  Book
  bold:
    family: DejaVuSansMono  
    style:  Bold
  italic:
    family: DejaVuSansMono 
    style:  Oblique
  bold_italic:
    family: DejaVuSansMono
    style: Bold Oblique
  size: 12
  offset:
      x: -1    
      y: 1 
draw_bold_text_with_bright_colors: true

colors:
  primary:
#    background: "#11121D"
    background: "#000000"
#    foreground: "#a9b1d6"
    foreground: "#ffffff"
  normal:
    black: "#32344a"
    red: "#f7768e"
    green: "#9ece6a"
    yellow: "#e0af68"
    blue: "#7aa2f7"
    magenta: "#ad8ee6"
    cyan: "#449dab"
    white: "#787c99"
  bright:
    black: "#444b6a"
    red: "#ff7a93"
    green: "#b9f27c"
    yellow: "#ff9e64"
    blue: "#7da6ff"
    magenta: "#bb9af7"
    cyan: "#0db9d7"
    white: "#acb0d0"

selection:
  save_to_clipboard: false

shell:
  program: /usr/bin/zsh

key_bindings:
  - { key: Return, mods: Super|Shift, action: SpawnNewInstance }
  - { key: V, mods: Control, action: Paste }
  - { key: C, mods: Control, action: Copy }

cursor: 
  style:
    shape: Beam
    blinking: On
  blink_interval: 500
  unfocused_hollow: false
  thickness: 0.15
